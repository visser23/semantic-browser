name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Lint
        run: ruff check src tests --select F,B

      - name: Type check
        run: mypy src

      - name: Unit, integration, and e2e tests
        run: pytest tests/unit tests/integration tests/e2e

      - name: Validate benchmark metadata
        run: python tools/validate_benchmark_manifest.py

      - name: Dependency audit
        run: pip-audit --ignore-vuln CVE-2026-4539
        # pygments <=2.19.2 has CVE-2026-4539 (ReDoS in AdlLexer archetype.py).
        # Fixed on master but no PyPI release yet. Remove once pygments >2.19.2 is released.
